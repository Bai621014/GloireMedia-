services:
  # 1. FRONTEND REACT VITE
    - type: static
    name: gloiremedia-front
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
            - type: rewrite
        source: /*
        destination: /index.html

  # 2. BACKEND NODE EXPRESS POUR MONETBIL
    - type: web
    name: gloiremedia-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node app.js
    envVars:
            - key: MONETBIL_SECRET_KEY
        sync: false
