<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GloireMedia | Écosystème Global</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">GloireMedia</div>
        <button class="upload-btn">+ Publier</button>
    </nav>

    <main>
        <!-- Section Live Immersif -->
        <section id="live-healing-streams">
            <div class="live-container">
                <div class="video-wrapper">
                    <iframe 
                        src="https://healingstreams.tv/zone/Wez3" 
                        allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </section>

        <!-- Section Social Feed -->
        <section id="video-feed">
            <h2 class="section-title">Actualités GloireHub</h2>
            <div class="video-grid">
                <!-- Exemple de Carte Multimédia -->
                <div class="video-card">
                    <div class="media-placeholder">📷</div>
                    <h3>Nouvelle Publication</h3>
                    <div class="card-actions">
                        <button>Partager</button>
                        <button>GloirePay</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Dashboard Financier -->
        <section id="dashboard" class="profile-container">
            <div class="wallet-card">
                <h3>Mon Portefeuille GloirePay</h3>
                <div class="balance-display"><span id="balance">0.00</span></div>
                <button class="withdraw-btn">Retrait Instantané via Airtel (+235 62 10 14 68)</button>
            </div>
        </section>
    </main>
</body>
</html>
