<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GloireMedia | Web3 & Healing Streams</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="votre-logo.png" alt="Logo GloireMedia">
        <h1>GloireMedia</h1>
        <div class="gloirecoin-banner">
            <p>🚀 <strong>GloireCoin</strong> : Économie Digitale Web3</p>
        </div>
    </header>

    <main>
        <!-- Section Live Pasteur Chris -->
        <section id="live-stream">
            <h2>Live : Healing Streams</h2>
            <div class="video-card live">
                <iframe src="https://healingstreams.tv/zone/Wez3" frameborder="0" allowfullscreen></iframe>
                <h3>Programmes du Pasteur Chris</h3>
            </div>
        </section>

        <!-- Section VideoFeed -->
        <section id="video-feed">
            <h2>Contenu GloireHub</h2>
            <div class="video-grid">
                <div class="video-card">
                    <div class="video-placeholder">Vidéo Web3</div>
                    <h3>Innovation & Progrès</h3>
                    <button>Gagner des GloireCoin</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
