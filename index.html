<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GloireMedia | Healing Streams</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>GloireMedia</h1>
    </header>

    <main>
        <!-- Flux Healing Streams du Pasteur Chris -->
        <section id="live-healing-streams">
            <div class="live-container">
                <div class="live-header">
                    <span class="live-indicator">● EN DIRECT</span>
                    <h2>Healing Streams - Pasteur Chris</h2>
                </div>
                <!-- Lecteur plein écran -->
                <div class="video-wrapper">
                    <iframe 
                        src="https://healingstreams.tv/zone/Wez3" 
                        allowfullscreen 
                        title="Healing Streams Live">
                    </iframe>
                </div>
                <p class="notification-text">Recevez une notification dès que le Pasteur Chris est en direct mondial.</p>
            </div>
        </section>

        <!-- Dashboard Utilisateur (Caché GloireCoin) -->
        <section id="dashboard" class="profile-container">
            <div class="wallet-card">
                <h3>Mon Solde</h3>
                <div class="balance-display">
                    <span id="balance">0.00</span> <span class="currency">Unités</span>
                </div>
                <button class="withdraw-btn">Transférer vers GloirePay</button>
            </div>
        </section>
    </main>
</body>
</html>
