<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GloireMedia | Studio Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">GloireMedia</div>
        <button id="upload_widget" class="upload-btn">📷 + Publier (Vidéo/Photo)</button>
    </nav>

    <main>
        <section id="live-healing-streams">
            <div class="video-wrapper">
                <iframe src="https://healingstreams.tv/zone/Wez3" allow="fullscreen" allowfullscreen></iframe>
            </div>
        </section>

        <section id="video-feed">
            <h2 class="section-title">Actualités GloireHub</h2>
            <div id="grid" class="video-grid"></div>
        </section>
    </main>

    <script>
        // Configuration Cloudinary
        var myWidget = cloudinary.createUploadWidget({
            cloudName: 'dvoya2e3o',
            uploadPreset: 'gloiremedia_unsigned'
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                console.log('Fichier uploadé :', result.info.secure_url);
                // Ajouter automatiquement à la grille
                const grid = document.getElementById('grid');
                grid.innerHTML += `<div class="video-card"><h3>Nouvelle publication</h3><img src="${result.info.secure_url}" width="100%"></div>`;
            }
        });

        document.getElementById("upload_widget").addEventListener("click", () => {
            myWidget.open();
        });
    </script>
</body>
</html>
