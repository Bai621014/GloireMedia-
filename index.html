<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GloireMedia - 10M FCFA</title>
  <script src="https://esm.sh/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --accent: #22c55e; --danger: #ef4444; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; align-items: center; }
    .card { background: var(--card); padding: 24px; border-radius: 16px; width: 100%; max-width: 420px; }
    h1 { font-size: 20px; margin: 0 0 16px; text-align: center; }
    label { font-size: 14px; opacity: 0.8; display: block; margin: 8px 0 6px; }
    input, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0b1220; color: var(--text); font-size: 16px; }
    button { background: var(--accent); color: #0f172a; font-weight: 700; border: none; cursor: pointer; margin-top: 12px; }
    #logoutBtn { background: #334155; color: var(--text); }
    .alert { margin-top: 12px; padding: 12px; border-radius: 10px; font-size: 14px; display: none; }
    .alert.err { background: rgba(239,68,68,0.1); border: 1px solid var(--danger); display: block; }
    .alert.ok { background: rgba(34,197,94,0.1); border: 1px solid var(--accent); display: block; }
    .solde { font-size: 32px; font-weight: 700; text-align: center; color: var(--accent); margin: 8px 0 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div id="authBox">
      <h1>Connexion Boss</h1>
      <label>Email</label><input id="email" type="email" value="eduboostgrace@gmail.com">
      <label>Mot de passe</label><input id="password" type="password" value="Gloire2026">
      <button id="loginBtn">Se connecter & Récupérer 10M</button>
    </div>

    <div id="retraitBox" style="display:none;">
      <h1>Mon Compte ✅</h1>
      <label>Solde GloireCoin</label>
      <div id="solde" class="solde">0 FCFA</div>
      
      <label>Montant à retirer FCFA</label><input id="montant" type="number" placeholder="Ex: 1000000">
      <label>Numéro Airtel Money TD</label><input id="numero" type="tel" placeholder="66 12 34 56">
      <button id="retirerBtn">Demander Retrait IMMÉDIAT</button>
      <button id="logoutBtn">Se déconnecter</button>
    </div>
    <div id="alert" class="alert"></div>
  </div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const SUPABASE_URL = 'https://sshwabalnigrkazgzopr.supabase.co' 
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzaHdhYmFsbmlncmthemd6b3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzUyNjEsImV4cCI6MjA5NzQ1MTI2MX0.lqfEtWFVl4y4N1WfVwsCqdT3OHljZ5LkBMpEaa52QNQ' 
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  const showAlert = (msg, type = 'err') => {
    const alertBox = document.getElementById('alert');
    alertBox.textContent = msg; alertBox.className = `alert ${type}`;
    setTimeout(() => { alertBox.style.display = 'none' }, 5000);
  }

  async function initUser() {
    const { data: { user } = await supabase.auth.getUser();
    if (!user) return;

    // CONCRET 20H719: CRÉE OU MET À JOUR À 10 000 000 AU 1ER LOGIN
    const { data: profile } = await supabase.from('profiles').select('solde').eq('id', user.id).single();
    
    if (!profile) {
      // 1er login: On crée avec 10M direct
      await supabase.from('profiles').insert({ id: user.id, solde: 10000000 });
      showAlert('BONUS 10 000 000 FCFA CRÉDITÉ ✅', 'ok');
      document.getElementById('solde').textContent = '10 000 000 FCFA';
    } else {
      document.getElementById('solde').textContent = profile.solde.toLocaleString() + ' FCFA';
    }
  }

  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) return showAlert('Erreur: ' + error.message);
    document.getElementById('authBox').style.display = 'none'; 
    document.getElementById('retraitBox').style.display = 'block';
    initUser();
  }

  document.getElementById('retirerBtn').onclick = async () => {
    const montant = parseInt(document.getElementById('montant').value);
    const numero = document.getElementById('numero').value.trim();
    if (montant < 1000 || !numero) return showAlert('Min 1000 FCFA + numéro requis');

    const { data: { user } = await supabase.auth.getUser();
    const { data: profile } = await supabase.from('profiles').select('solde').eq('id', user.id).single();
    
    if (profile.solde < montant) return showAlert('Solde insuffisant');
    
    // CONCRET 20H720: ON ENREGISTRE LA DEMANDE. STATUT = PAYE_AUTO SI API OK
    const { error } = await supabase.from('retraits').insert({ 
      user_id: user.id, montant, numero, statut: 'en_attente_paiement_auto' 
    });
    if(error) return showAlert('Erreur DB: ' + error.message);

    await supabase.from('profiles').update({ solde: profile.solde - montant }).eq('id', user.id);
    
    showAlert(`Demande de ${montant.toLocaleString()} FCFA envoyée. Paiement auto en cours...`, 'ok');
    initUser(); // Recharge le solde
  }

  document.getElementById('logoutBtn').onclick = async () => {
    await supabase.auth.signOut();
    document.getElementById('retraitBox').style.display = 'none'; 
    document.getElementById('authBox').style.display = 'block';
  }
</script>
</body>
</html>
