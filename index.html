<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GloireMedia | Healing Streams & Web3 Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Barre de navigation fixée -->
    <nav class="navbar">
        <div class="logo">GloireMedia</div>
        <div class="nav-links"><span>Healing Streams</span></div>
    </nav>

    <main>
        <!-- Section Live (Immersif) -->
        <section id="live-healing-streams">
            <div class="live-container">
                <div class="live-header">
                    <span class="live-indicator">● EN DIRECT</span>
                    <h2>Healing Streams avec le Pasteur Chris</h2>
                </div>
                <div class="video-wrapper">
                    <iframe src="https://healingstreams.tv/zone/Wez3" allowfullscreen></iframe>
                </div>
                <div class="broadcast-banner">
                    <p>Diffusion mondiale en haute définition</p>
                </div>
            </div>
        </section>

        <!-- Section VideoFeed (Grille dynamique) -->
        <section id="video-feed">
            <h2 class="section-title">Contenu Inspirant</h2>
            <div class="video-grid">
                <div class="video-card">
                    <div class="video-placeholder">🚀</div>
                    <h3>Titre Vidéo Pro</h3>
                </div>
                <div class="video-card">
                    <div class="video-placeholder">✨</div>
                    <h3>Titre Vidéo Pro</h3>
                </div>
            </div>
        </section>

        <!-- Dashboard (Interface financière épurée) -->
        <section id="dashboard" class="profile-container">
            <div class="wallet-card">
                <h3>Gestion de compte</h3>
                <div class="balance-display">
                    <span id="balance">0.00</span> <span class="currency">Unités</span>
                </div>
                <button class="withdraw-btn">Transférer vers GloirePay</button>
            </div>
        </section>
    </main>
</body>
</html>
