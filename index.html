<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>*224# GloireMedia</title><script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>body{background:#000;color:#fff;font-family:system-ui;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}.box{background:#111;padding:20px;border-radius:12px;width:90%;max-width:380px;border:2px solid #22c55e}h2{text-align:center;color:#22c55e;margin:0 0 10px;font-size:22px}.solde{font-size:44px;color:#22c55e;text-align:center;font-weight:900;margin:10px 0}input,button{width:100%;padding:16px;margin-top:12px;border-radius:8px;border:0;font-size:18px;font-weight:700}input{background:#222;color:#fff;text-align:center}button{background:#22c55e;color:#000;cursor:pointer}button:active{background:#16a34a}.msg{margin-top:12px;text-align:center;font-size:15px}</style></head>
<body><div class="box">
<h2>*224# GloireMedia</h2>
<div class="solde" id="s">10,000,000 FCFA</div>
<input id="n" type="tel" placeholder="Numéro Airtel 66 XX" maxlength="10">
<input id="m" type="number" placeholder="Montant FCFA" min="1000">
<button onclick="ret()">1. Envoyer</button>
<div id="x" class="msg"></div>
</div>
<script>
const s=supabase.createClient('https://sshwabalnigrkazgzopr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzaHdhYmFsbmlncmthemd6b3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzUyNjEsImV4cCI6MjA5NzQ1MTI2MX0.lqfEtWFVl4y4N1WfVwsCqdT3OHljZ5LkBMpEaa52QNQ');
const BOSS_EMAIL='eduboostgrace@gmail.com'; const BOSS_PWD='123456';

async function ret(){
x.textContent=''; x.style.color='#22c55e';
const numero=n.value.trim(); const montant=+m.value;
if(!numero||numero.length<8)return x.textContent='❌ Numéro invalide';
if(montant<1000)return x.textContent='❌ Min 1000 FCFA';
x.textContent='Traitement...';

const{data:{user},error}=await s.auth.signInWithPassword({email:BOSS_EMAIL,password:BOSS_PWD});
if(error)return x.textContent='❌ Erreur système';

const{data}=await s.from('profiles').select('solde').eq('id',user.id).single();
if(!data||data.solde<montant)return x.textContent='❌ Solde insuffisant';

await s.from('retraits').insert({user_id:user.id,montant,numero,statut:'en_attente'});
await s.from('profiles').update({solde:data.solde-montant}).eq('id',user.id);
s.textContent=(data.solde-montant).toLocaleString()+' FCFA';
x.textContent='✅ Retrait '+montant.toLocaleString()+' FCFA envoyé au '+numero;
m.value=''; n.value='';
}
</script></body></html>
